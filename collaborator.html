<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loop | Collaborator experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --brand-25:#EAFAF2; --brand-50:#D9F5E6; --brand-100:#BBE5D0; --brand-200:#94CCB1; --brand-300:#67AC8D;
  --brand-400:#348263; --brand-500:#045B3F; --brand-600:#004932; --brand-700:#003926; --brand-800:#00291A; --brand-900:#001D11;
  --success-25:#F6FEF9; --success-50:#EDFCF2; --success-100:#D3F8DF; --success-200:#AAF0C4; --success-300:#73E2A3;
  --success-400:#3CCB7F; --success-500:#16B364; --success-600:#099250; --success-700:#087443; --success-800:#095C37; --success-900:#084C2E;
  --gray-25:#FCFCFD; --gray-50:#F8FAFC; --gray-100:#EEF2F6; --gray-200:#E3E8EF; --gray-300:#CDD5DF;
  --gray-400:#9AA4B2; --gray-500:#697586; --gray-600:#4B5565; --gray-700:#364152; --gray-800:#202939; --gray-900:#121926;
  --error-25:#FFF5F6; --error-50:#FFF1F3; --error-100:#FFE4E8; --error-200:#FECDD6; --error-600:#E31B54; --error-700:#C01048;
  --warn-25:#FFFCF5; --warn-50:#FFFAEB; --warn-100:#FEF0C7; --warn-200:#FEDF89; --warn-700:#B54708; --warn-800:#93370D;
  --blue-25:#F5FAFF; --blue-50:#EFF8FF; --blue-100:#D1E9FF; --blue-200:#B2DDFF; --blue-300:#84CAFF; --blue-500:#2E90FA; --blue-600:#1570EF; --blue-700:#175CD3;
  --shadow-overlay:0 0 0 1px rgba(0,0,0,.06),0 12px 16px -4px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.03);
  --shadow-sm:0 1px 2px rgba(16,24,40,.05);
  --rail:268px;
  --dock:54px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:"DM Sans",sans-serif;color:var(--gray-900);background:#fff;font-size:15px;line-height:1.5;padding-bottom:var(--dock)}
.hidden{display:none!important}
a{color:var(--brand-500)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::placeholder{color:var(--gray-400)}

/* logo */
.logo{display:inline-flex;align-items:center;text-decoration:none}
.logo img{display:block;height:30px;width:auto}
.sidebar .logo img,.lim-top .logo img{height:24px}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;height:54px;padding:0 26px;border-radius:10px;font-size:15.5px;font-weight:600;border:none;transition:background .12s}
.btn-primary{background:var(--brand-500);color:#fff;width:100%}
.btn-primary:hover{background:var(--brand-600)}
.btn-primary[disabled]{background:var(--gray-200);color:var(--gray-500);cursor:not-allowed}
.btn-secondary{background:#fff;color:var(--gray-700);border:1px solid var(--gray-300);width:100%}
.btn-secondary:hover{border-color:var(--gray-400);background:var(--gray-50)}
.btn-sm{height:44px;font-size:14.5px;padding:0 20px;width:auto}
.btn.btn-google{width:100%;background:#fff;color:var(--gray-800);border:1px solid var(--gray-300)}
.btn.btn-google:hover{background:var(--gray-50);border-color:var(--gray-400)}
.btn-link{background:none;border:none;font-size:14px;font-weight:600;color:var(--gray-700);text-decoration:underline;text-underline-offset:3px;padding:8px 4px}

/* fields */
.fgrid{display:flex;flex-direction:column;gap:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{position:relative}
.field input,.field select{width:100%;height:58px;padding:25px 42px 9px 16px;border:1px solid var(--gray-300);border-radius:10px;font-size:15px;color:var(--gray-900);background:#fff;appearance:none;transition:border-color .12s,box-shadow .12s}
.field textarea{width:100%;min-height:104px;padding:28px 16px 12px;border:1px solid var(--gray-300);border-radius:10px;font-size:15px;color:var(--gray-900);background:#fff;resize:vertical;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand-500);box-shadow:0 0 0 4px rgba(4,91,63,.12)}
.field label{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--gray-500);font-size:15px;pointer-events:none;transition:all .13s ease;white-space:nowrap;max-width:calc(100% - 50px);overflow:hidden;text-overflow:ellipsis}
.field.area label{top:26px}
.field.filled label,.field:focus-within label,.field.fixed label{top:10px;transform:none;font-size:11.5px;letter-spacing:.02em}
.field .chev{position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--gray-500)}
.fixedbox{display:flex;flex-direction:column;justify-content:center;min-height:58px;border:1px solid var(--gray-300);border-radius:10px;padding:9px 16px}
.fixedbox .t{font-size:11.5px;color:var(--gray-500)}
.fixedbox .v{font-size:15px}
.pw-hint{font-size:12.5px;color:var(--gray-500);margin:-8px 0 0 2px}
.pw-hint.ok{color:var(--success-700)}

/* code row (OTP) */
.code-row{display:flex;gap:10px;margin:18px 0 6px}
.code-row input{width:48px;height:56px;text-align:center;font-size:22px;font-weight:600;border:1px solid var(--gray-300);border-radius:10px;color:var(--gray-900)}
.code-row input:focus{outline:none;border-color:var(--brand-500);box-shadow:0 0 0 4px rgba(4,91,63,.14)}

/* split-screen shell (invitation / auth / otp) */
.shell{display:flex;min-height:100vh}
.pane{flex:1 1 50%;min-width:0;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:88px 48px 56px}
.pane-brand{position:absolute;top:30px;left:40px}
.pane-brand .logo img{height:30px}
.inner{width:100%;max-width:430px}
.inner h1{font-size:27px;font-weight:500;letter-spacing:-.4px;margin-bottom:6px}
.sub{color:var(--gray-600);margin-bottom:22px;font-size:14.5px;line-height:1.55}
.media{flex:1 1 50%;min-width:0;background:#011710 url('loop-hero-background.png') center/cover no-repeat;position:relative}
.media-quote{position:absolute;left:48px;right:48px;bottom:56px;color:#fff}
.media-quote .mq-mark{font-size:15px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--brand-200);margin-bottom:14px}
.media-quote p{font-size:21px;font-weight:500;line-height:1.45;letter-spacing:-.3px}
.media-quote .mq-by{margin-top:16px;font-size:13.5px;color:rgba(255,255,255,.75)}
.or-divider{display:flex;align-items:center;gap:12px;color:var(--gray-400);font-size:11.5px;font-weight:700;letter-spacing:.07em;margin:20px 0}
.or-divider::before,.or-divider::after{content:"";flex:1;height:1px;background:var(--gray-200)}
.foot-note{margin-top:20px;font-size:13.5px;color:var(--gray-600)}
.legal{margin-top:18px;font-size:12px;color:var(--gray-500);line-height:1.55}
.legal a{color:var(--gray-600)}
@media (max-width:880px){.media{display:none}.pane{flex:1 1 100%;padding:80px 24px 48px}}

/* badges + who */
.who-line{display:flex;align-items:center;gap:12px;border:1px solid var(--gray-200);border-radius:12px;padding:12px 14px;background:var(--gray-25);margin-bottom:18px}
.who-av{flex:0 0 42px;height:42px;border-radius:50%;background:var(--brand-500);color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center}
.who-meta{min-width:0}
.who-meta .wm-n{font-weight:600;font-size:14.5px}
.who-meta .wm-e{font-size:12.5px;color:var(--gray-500);word-break:break-all}
.access-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;border-radius:999px;padding:5px 11px;letter-spacing:.01em}
.access-badge.full{background:var(--brand-25);color:var(--brand-700)}
.access-badge.lim{background:var(--blue-25);color:var(--blue-700)}
.scope-list{margin:18px 0 4px;list-style:none;display:flex;flex-direction:column;gap:11px}
.scope-list li{display:flex;gap:11px;font-size:14px;color:var(--gray-700);line-height:1.5}
.scope-list li svg{flex:0 0 18px;margin-top:1px;color:var(--brand-500)}
.scope-list li.no svg{color:var(--gray-400)}
.scope-list li.no{color:var(--gray-500)}
.privacy-note{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--gray-600);line-height:1.55;border:1px solid var(--gray-200);background:var(--gray-25);border-radius:12px;padding:13px 15px;margin-top:6px}
.privacy-note svg{flex:0 0 16px;margin-top:1px;color:var(--gray-500)}

/* method cards (access choice + mfa) */
.opt-card{display:flex;align-items:flex-start;gap:14px;border:1px solid var(--gray-300);border-radius:14px;padding:17px 18px;cursor:pointer;margin-bottom:12px;transition:all .12s;background:#fff;text-align:left;width:100%}
.opt-card:hover{border-color:var(--brand-400);background:var(--brand-25)}
.opt-card.on{border-color:var(--brand-500);background:var(--brand-25)}
.opt-card .oc-ic{flex:0 0 40px;height:40px;border-radius:11px;background:var(--brand-25);color:var(--brand-700);display:flex;align-items:center;justify-content:center}
.opt-card.on .oc-ic{background:var(--brand-500);color:#fff}
.opt-card .oc-t{font-weight:600;font-size:15.5px}
.opt-card .oc-d{font-size:13px;color:var(--gray-600);margin-top:3px;line-height:1.5}
.opt-card .oc-tag{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;background:var(--success-50);color:var(--success-800)}
.opt-card .oc-tag.muted{background:var(--gray-100);color:var(--gray-600)}
.opt-card .oc-arrow{margin-left:auto;align-self:center;color:var(--gray-400)}

.ok-banner{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--success-100);background:var(--success-25);border-radius:12px;padding:13px 15px;font-size:13.5px;color:var(--success-800);line-height:1.5;margin-bottom:18px}
.ok-banner svg{flex:0 0 16px;margin-top:1px}
.info-banner{display:flex;align-items:flex-start;gap:10px;border:1px solid var(--warn-100);background:var(--warn-50);border-radius:12px;padding:13px 15px;font-size:13.5px;color:var(--warn-800);line-height:1.5;margin-bottom:18px}
.info-banner svg{flex:0 0 16px;margin-top:1px}
.sub-check{width:58px;height:58px;border-radius:50%;background:var(--success-50);display:flex;align-items:center;justify-content:center;margin-bottom:22px}

/* live camera (idv) */
.cam{border:1px solid var(--gray-200);border-radius:14px;background:var(--gray-25);padding:22px 20px;text-align:center}
.cam-view{position:relative;width:210px;height:150px;margin:0 auto 14px;border-radius:12px;background:linear-gradient(135deg,#1c2430,#34404f);overflow:hidden}
.cam-view .sil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4)}
.cam-view .scanline{position:absolute;left:8%;right:8%;height:2px;background:var(--success-300);box-shadow:0 0 12px var(--success-300);top:12%;animation:scan 1.1s ease-in-out infinite alternate}
@keyframes scan{to{top:84%}}
.cam-status{font-size:12.5px;color:var(--gray-500);margin-top:8px}

/* ============ email client mock ============ */
.mail-app{min-height:100vh;background:var(--gray-100);display:flex;flex-direction:column}
.mail-chrome{display:flex;align-items:center;gap:14px;padding:14px 24px;background:#fff;border-bottom:1px solid var(--gray-200)}
.mail-chrome .mc-dots{display:flex;gap:7px}
.mail-chrome .mc-dots span{width:11px;height:11px;border-radius:50%}
.mail-chrome .mc-search{flex:1;max-width:420px;height:36px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;gap:9px;padding:0 13px;color:var(--gray-500);font-size:13px}
.mail-chrome .mc-acct{margin-left:auto;font-size:13px;color:var(--gray-600);display:flex;align-items:center;gap:9px}
.mail-chrome .mc-acct .mc-av{width:30px;height:30px;border-radius:50%;background:var(--brand-100);color:var(--brand-700);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.mail-scroll{flex:1;overflow:auto;display:flex;justify-content:center;padding:30px 20px 60px}
.mail{max-width:640px;width:100%;background:#fff;border:1px solid var(--gray-200);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;align-self:flex-start}
.mail-subject{padding:24px 30px 0;font-size:21px;font-weight:600;letter-spacing:-.3px}
.mail-from{display:flex;align-items:center;gap:13px;padding:16px 30px 18px;border-bottom:1px solid var(--gray-100)}
.mail-from .mf-av{flex:0 0 42px;height:42px;border-radius:50%;background:var(--brand-500);display:flex;align-items:center;justify-content:center}
.mail-from .mf-av img{height:17px}
.mail-from .mf-meta .mf-n{font-weight:600;font-size:14px}
.mail-from .mf-meta .mf-d{font-size:12.5px;color:var(--gray-500)}
.mail-from .mf-time{margin-left:auto;font-size:12.5px;color:var(--gray-500)}
.mail-body{padding:28px 30px 32px}
.mail-body p{font-size:15px;color:var(--gray-700);line-height:1.6;margin-bottom:16px}
.mail-body .greet{font-size:16px;color:var(--gray-900)}
.mail-cta{display:inline-flex;align-items:center;justify-content:center;height:50px;padding:0 30px;border-radius:10px;background:var(--brand-500);color:#fff;font-size:15.5px;font-weight:600;text-decoration:none;border:none;margin:6px 0 8px}
.mail-cta:hover{background:var(--brand-600)}
.mail-assigned{border:1px solid var(--gray-200);border-radius:12px;background:var(--gray-25);padding:16px 18px;margin:6px 0 20px}
.mail-assigned .ma-h{font-size:12.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gray-500);margin-bottom:10px}
.mail-assigned ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.mail-assigned li{display:flex;gap:9px;font-size:13.5px;color:var(--gray-700)}
.mail-assigned li svg{flex:0 0 15px;margin-top:2px;color:var(--brand-500)}
.mail-assigned .ma-page{font-size:15px;font-weight:600;color:var(--gray-900);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mail-fine{font-size:12.5px;color:var(--gray-500);line-height:1.6}
.mail-finelink{font-size:12.5px;color:var(--gray-500);margin-top:14px;word-break:break-all}
.mail-sig{margin-top:20px;font-size:14px;color:var(--gray-600)}

/* ============ full workspace (mirrors the applicant app shell) ============ */
.app{display:block}
.sidebar{position:fixed;top:0;left:0;bottom:var(--dock);width:var(--rail);background:var(--gray-25);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;padding:26px 16px 18px;z-index:40;overflow-y:auto}
.sidebar .logo{margin:0 8px 22px;flex:0 0 auto}
.ws-collabtag{margin:0 6px 18px;border:1px solid var(--gray-200);border-radius:12px;background:#fff;padding:12px 13px}
.ws-collabtag .ct-row{display:flex;align-items:center;gap:10px}
.ws-collabtag .ct-av{flex:0 0 32px;height:32px;border-radius:50%;background:var(--brand-25);color:var(--brand-700);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.ws-collabtag .ct-n{font-weight:600;font-size:13px}
.ws-collabtag .ct-r{font-size:11.5px;color:var(--gray-500)}
.ws-collabtag .ct-badge{margin-top:9px}
.step-meta{font-size:11px;font-weight:700;letter-spacing:.09em;color:var(--gray-500);text-transform:uppercase;margin:0 12px 10px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;font-size:14px;color:var(--gray-600);background:none;border:none;text-align:left;width:100%}
.nav-item:hover{background:var(--gray-100)}
.nav-item.active{background:var(--brand-25);color:var(--brand-700);font-weight:600}
.nav-item .stat{flex:0 0 18px;height:18px;display:inline-flex;align-items:center;justify-content:center}
.nav-item .stat .ring{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--gray-300);display:block}
.nav-item .ni-tag{margin-left:auto;font-size:10px;font-weight:700;background:var(--warn-100);color:var(--warn-800);border-radius:999px;padding:2px 7px;white-space:nowrap}
.nav-item .ni-tag.you{background:var(--brand-50);color:var(--brand-700)}
.side-spacer{flex:1}
.userbox{border-top:1px solid var(--gray-200);margin-top:8px;padding:14px 12px 0}
.userbox .em{font-size:12.5px;color:var(--gray-600);word-break:break-all;margin-bottom:8px}
.userbox button{background:none;border:none;font-size:13.5px;color:var(--gray-600);padding:0;display:flex;align-items:center;gap:7px}
.userbox button:hover{color:var(--gray-900)}
main{margin-left:var(--rail);padding:48px 48px 120px;display:flex;justify-content:center}
.col{width:100%;max-width:660px}
.ws-context{display:flex;align-items:center;gap:13px;border:1px solid var(--brand-100);background:var(--brand-25);border-radius:14px;padding:15px 18px;margin-bottom:30px}
.ws-context .wc-ic{flex:0 0 36px;height:36px;border-radius:50%;background:#fff;color:var(--brand-600);display:flex;align-items:center;justify-content:center}
.ws-context .wc-t{font-size:14px;color:var(--brand-800);line-height:1.5}
.ws-context .wc-t strong{font-weight:700}
h1.page-h{font-size:34px;font-weight:500;letter-spacing:-.8px;margin-bottom:8px}
.page-sub{color:var(--gray-600);font-size:15px;margin-bottom:8px;line-height:1.55}
.pagebody{margin-top:30px}
.fsec{margin-top:42px}
.fsec:first-child{margin-top:0}
.fsec h2{font-size:19px;font-weight:600;letter-spacing:-.2px;margin-bottom:5px}
.fsec .why{font-size:14px;color:var(--gray-600);margin:0 0 14px;max-width:540px;line-height:1.55}
.fill-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--gray-600);background:var(--gray-100);border-radius:999px;padding:4px 11px;vertical-align:2px}
.fill-chip svg{flex:0 0 12px}
.fill-chip.you{background:var(--brand-25);color:var(--brand-700)}
.sec-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:5px}
.sec-head h2{margin-bottom:0}
.kv{display:grid;grid-template-columns:200px 1fr;gap:2px 18px;border:1px solid var(--gray-200);border-radius:12px;background:#fff;box-shadow:var(--shadow-sm);padding:6px 18px;margin-top:16px}
.kv .kr{display:contents}
.kv .kl{font-size:13px;color:var(--gray-500);padding:13px 0;border-bottom:1px solid var(--gray-100)}
.kv .kvv{font-size:14.5px;padding:13px 0;border-bottom:1px solid var(--gray-100)}
.kv .kr:last-child .kvv,.kv .kr:last-child .kl{border-bottom:none}
.kv .kvv.miss{color:var(--warn-800)}
.readonly-note{display:flex;gap:9px;align-items:center;font-size:12.5px;color:var(--gray-500);margin-top:12px}
.readonly-note svg{flex:0 0 14px;color:var(--gray-400)}

/* questions */
.q{margin-top:26px}
.q:first-child{margin-top:0}
.q-label{font-size:14.5px;font-weight:600;margin-bottom:12px}
.q-label .req-mark{color:var(--gray-500);font-weight:400}
.sliderq input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;background:var(--gray-100);outline:none;margin:10px 0 2px;cursor:pointer}
.sliderq input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2.5px solid var(--brand-500);box-shadow:0 1px 3px rgba(16,24,40,.18);cursor:grab}
.sliderq input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:2.5px solid var(--brand-500);box-shadow:0 1px 3px rgba(16,24,40,.18);cursor:grab}
.slider-read{font-size:13.5px;color:var(--gray-600);margin-top:8px}
.slider-read strong{color:var(--gray-900);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--gray-300);border-radius:999px;padding:10px 18px;font-size:14px;color:var(--gray-600);cursor:pointer;user-select:none;transition:all .12s;background:#fff}
.chip.on{border-color:var(--brand-500);background:var(--brand-25);color:var(--brand-700);font-weight:600}
.upload{display:block;border:1.5px dashed var(--gray-300);border-radius:12px;padding:24px 20px;text-align:center;cursor:pointer;transition:all .12s;background:#fff}
.upload:hover{border-color:var(--brand-400);background:var(--brand-25)}
.upload .u1{font-size:14.5px;font-weight:600;color:var(--gray-700);margin-top:6px}
.upload .u2{font-size:12.5px;color:var(--gray-500);margin-top:3px}
.filechip{display:flex;align-items:center;gap:12px;border:1px solid var(--gray-200);border-radius:12px;padding:13px 15px;background:#fff}
.filechip .fname{flex:1;font-size:14px;font-weight:600;color:var(--gray-700);word-break:break-all}
.filechip .fsub{font-size:12px;color:var(--success-700);font-weight:600}
.filechip button{background:none;border:none;color:var(--gray-400);padding:4px}
.filechip button:hover{color:var(--error-600)}
.compliance{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--gray-500);margin-top:14px;line-height:1.5}
.compliance svg{flex:0 0 14px;margin-top:1px}
.continue-wrap{margin-top:44px;display:flex;gap:12px}

/* key contact cards (contacts page) */
.person-card{border:1px solid var(--gray-200);border-radius:14px;background:#fff;box-shadow:var(--shadow-sm);padding:16px 18px;margin-top:12px}
.person-card .pc-row{display:flex;align-items:center;gap:13px}
.person-card .pc-av{flex:0 0 40px;height:40px;border-radius:50%;background:var(--brand-25);color:var(--brand-700);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
.person-card .pc-who{flex:1;min-width:0}
.person-card .pc-n{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.person-card .pc-r{font-size:12.5px;color:var(--gray-500);margin-top:1px}
.person-card .pc-you{font-size:10.5px;font-weight:700;background:var(--brand-500);color:#fff;border-radius:999px;padding:2px 8px;letter-spacing:.02em}
.idv-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;border-radius:999px;padding:4px 10px;white-space:nowrap}
.idv-pill.ok{background:var(--success-50);color:var(--success-800)}
.idv-pill.wait{background:var(--warn-50);color:var(--warn-800)}
.person-card .pc-verify{margin-top:14px;border-top:1px solid var(--gray-100);padding-top:14px}
.rbx-card{border:1px solid var(--gray-200);border-radius:14px;background:#fff;box-shadow:var(--shadow-sm);padding:18px;margin-top:16px}
.rbx-card h4{font-size:14.5px;font-weight:600;margin-bottom:12px}

/* screening agent */
.reg-panel{margin-top:14px}
.reg-row{display:flex;align-items:center;gap:11px;padding:7px 0;font-size:14px;color:var(--gray-700)}
.reg-row .ic{flex:0 0 18px;height:18px;display:inline-flex;align-items:center;justify-content:center}
.reg-row.done{color:var(--gray-600)}
.spinner{display:inline-block;width:15px;height:15px;border-radius:50%;border:2px solid var(--gray-200);border-top-color:var(--brand-500);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.docreq{display:flex;gap:12px;border:1px solid var(--gray-200);border-radius:12px;background:var(--gray-25);padding:15px 16px;margin-top:10px}
.docreq .dt{font-size:14.5px;font-weight:600}
.docreq .dd{font-size:13px;color:var(--gray-600);margin-top:2px;line-height:1.5}
.agent-banner{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--success-100);background:var(--success-25);border-radius:12px;padding:13px 15px;font-size:13.5px;color:var(--success-800);line-height:1.5;margin-top:12px}

/* review */
.rv-sec{border:1px solid var(--gray-200);border-radius:14px;background:#fff;box-shadow:var(--shadow-sm);margin-top:16px;overflow:hidden}
.rv-sec .rv-head{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--gray-100)}
.rv-sec .rv-head h3{font-size:15px;font-weight:600;flex:1}
.rv-sec .rv-head .rv-st{font-size:12px;font-weight:700;border-radius:999px;padding:3px 10px}
.rv-sec .rv-head .rv-st.ok{background:var(--success-50);color:var(--success-800)}
.rv-sec .rv-head .rv-st.gap{background:var(--warn-50);color:var(--warn-800)}
.rv-sec .rv-body{padding:6px 18px}
.rv-sec .rv-kr{display:flex;gap:18px;padding:11px 0;border-bottom:1px solid var(--gray-100);font-size:13.5px}
.rv-sec .rv-kr:last-child{border-bottom:none}
.rv-sec .rv-kr .l{flex:0 0 190px;color:var(--gray-500);font-size:12.5px}
.rv-sec .rv-kr .v{flex:1}
.rv-sec .rv-kr .v.miss{color:var(--warn-800)}
.submit-gate{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--gray-200);background:var(--gray-25);border-radius:12px;padding:14px 16px;font-size:13.5px;color:var(--gray-600);line-height:1.55;margin-top:26px}
.submit-gate svg{flex:0 0 16px;margin-top:2px;color:var(--gray-500)}

/* save toast */
.save-toast{position:fixed;right:22px;bottom:calc(var(--dock) + 18px);display:flex;align-items:center;gap:9px;background:var(--gray-900);color:#fff;font-size:13px;font-weight:500;border-radius:10px;padding:11px 16px;box-shadow:var(--shadow-overlay);opacity:0;transform:translateY(8px);transition:all .22s ease;pointer-events:none;z-index:120}
.save-toast.show{opacity:1;transform:translateY(0)}
.save-toast svg{color:var(--success-300)}

/* ============ limited (page-scoped) workspace ============ */
.lim-wrap{min-height:100vh;background:var(--gray-50);display:flex;flex-direction:column;align-items:center;padding:32px 20px 80px}
.lim-top{width:100%;max-width:680px;display:flex;align-items:center;margin-bottom:26px}
.lim-top .lt-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.lim-top .lt-em{font-size:13px;color:var(--gray-600)}
.lim-top .lt-out{background:none;border:none;font-size:13px;color:var(--gray-600);display:flex;align-items:center;gap:6px}
.lim-top .lt-out:hover{color:var(--gray-900)}
.lim-card{width:100%;max-width:680px;background:#fff;border:1px solid var(--gray-200);border-radius:18px;box-shadow:var(--shadow-sm);padding:36px 40px 34px}
.lim-card h1{font-size:26px;font-weight:500;letter-spacing:-.4px;margin-bottom:8px}
.lim-card .lc-sub{font-size:15px;color:var(--gray-600);line-height:1.55;margin-bottom:18px}
.lim-progress{font-size:13px;font-weight:600;color:var(--gray-500);margin:28px 0 4px}
.lim-bar{height:6px;border-radius:999px;background:var(--gray-100);overflow:hidden;margin-bottom:24px}
.lim-bar span{display:block;height:100%;background:var(--brand-500);border-radius:999px;transition:width .25s ease}
@media (max-width:640px){.lim-card{padding:28px 22px}}

/* done screen */
.sub-wrap{min-height:100vh;background:var(--gray-50);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px}
.sub-brand{position:absolute;top:30px;left:40px}
.sub-card{width:100%;max-width:520px;background:#fff;border:1px solid var(--gray-200);border-radius:18px;box-shadow:var(--shadow-sm);padding:40px 42px}
.sub-card h1{font-size:26px;font-weight:500;letter-spacing:-.4px;margin-bottom:8px}
.sub-card .lead{font-size:15px;color:var(--gray-600);line-height:1.6;margin-bottom:6px}
.next-list{margin:20px 0 4px;list-style:none;display:flex;flex-direction:column;gap:13px}
.next-list li{display:flex;gap:11px;font-size:14px;color:var(--gray-700);line-height:1.5}
.next-list li svg{flex:0 0 17px;margin-top:2px;color:var(--brand-500)}

/* ============ PROTOTYPE CONTROL DOCK ============ */
.dock{position:fixed;left:0;right:0;bottom:0;z-index:200;font-family:"DM Sans",sans-serif}
.dock-bar{height:var(--dock);background:#0f1722;color:#e3e8ef;display:flex;align-items:center;gap:16px;padding:0 16px;border-top:1px solid #243042}
.dock-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.12em;color:#7CC9A6;white-space:nowrap}
.dock-tag .dt-dot{width:8px;height:8px;border-radius:2px;background:#16B364;transform:rotate(45deg)}
.dock-now{font-size:13px;color:#9aa4b2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dock-now b{color:#fff;font-weight:600}
.dock-now .sep{margin:0 8px;color:#3a475a}
.dock-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.dock-actions button{height:34px;padding:0 14px;border-radius:8px;border:1px solid #2c3a4d;background:#1a2531;color:#cdd5df;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.dock-actions button:hover{background:#22303f;border-color:#3a475a;color:#fff}
.dock-actions button.primary{background:#0c5d40;border-color:#0c5d40;color:#fff}
.dock-actions button.primary:hover{background:#0a6d49}
.dock-panel{background:#0f1722;border-top:1px solid #243042;padding:18px 20px 22px;max-height:62vh;overflow:auto}
.dock-group{margin-bottom:18px}
.dock-group:last-child{margin-bottom:0}
.dock-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#697586;margin-bottom:10px}
.dock-label .dl-hint{font-weight:500;letter-spacing:0;text-transform:none;color:#56657a;margin-left:8px}
.dock-scens{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:9px}
.scen{text-align:left;border:1px solid #2c3a4d;background:#151f2b;border-radius:11px;padding:12px 14px;color:#cdd5df;transition:all .12s}
.scen:hover{border-color:#3a475a;background:#1a2531}
.scen.on{border-color:#16B364;background:#10241c}
.scen .sc-n{font-size:13.5px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.scen .sc-num{flex:0 0 20px;height:20px;border-radius:6px;background:#22303f;color:#9aa4b2;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.scen.on .sc-num{background:#16B364;color:#06210f}
.scen .sc-d{font-size:11.5px;color:#7a8699;margin-top:5px;line-height:1.45}
.scen .sc-tags{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap}
.scen .sc-tags span{font-size:10px;font-weight:700;border-radius:999px;padding:2px 8px;background:#22303f;color:#9aa4b2}
.scen .sc-tags span.scope-full{background:#10241c;color:#7CC9A6}
.scen .sc-tags span.scope-lim{background:#16283e;color:#8ec2f5}
.dock-steps{display:flex;flex-wrap:wrap;gap:7px}
.dstep{display:inline-flex;align-items:center;gap:8px;border:1px solid #2c3a4d;background:#151f2b;border-radius:999px;padding:7px 13px 7px 9px;color:#9aa4b2;font-size:12.5px;font-weight:500}
.dstep:hover{border-color:#3a475a;color:#fff}
.dstep .ds-num{width:18px;height:18px;border-radius:50%;background:#22303f;color:#9aa4b2;font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.dstep.on{border-color:#16B364;background:#10241c;color:#fff}
.dstep.on .ds-num{background:#16B364;color:#06210f}
.dstep.done .ds-num{background:#0c5d40;color:#cdebdb}
.dock-tip{font-size:11.5px;color:#56657a;margin-top:14px;line-height:1.5}
.dock-tip kbd{background:#22303f;border-radius:5px;padding:1px 6px;font-family:inherit;font-size:11px;color:#9aa4b2}
</style>
</head>

/* wire a 6-box code input */
function wireCode(rootId,onDone){
  var row=$(rootId);if(!row)return;
  var cis=[].slice.call(row.querySelectorAll('input'));
  cis.forEach(function(inp,i){
    inp.addEventListener('input',function(){
      inp.value=inp.value.replace(/\D/g,'').slice(0,1);
      if(inp.value&&i<cis.length-1)cis[i+1].focus();
      onDone(cis.every(function(c){return c.value;}));
    });
    inp.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!inp.value&&i>0)cis[i-1].focus();});
  });
  cis[0].focus();
}

function chipsQ(key,label,opts,multi,filledBy){
  var val=A[key];
  var html='<div class="q" id="q-'+key+'">'+(label?'<div class="q-label">'+esc(label)+(filledBy?' '+fillChip(filledBy):'')+'</div>':'')+'<div class="chips" data-chips="'+key+'" data-multi="'+(multi?1:0)+'">';
  opts.forEach(function(o){

    html+='<span class="chip'+(on?' on':'')+'" data-val="'+esc(o)+'">'+esc(o)+'</span>';
  });
  return html+'</div></div>';
}
function sliderQ(key){
  var meta=SLIDER_META[key],opts=SLIDERS[key];
  var idx=A[key]?opts.indexOf(A[key]):-1;
  return '<div class="q sliderq" data-slider="'+key+'" data-suffix="'+esc(meta.suffix)+'">'+
    '<div class="q-label">'+esc(meta.label)+'</div>'+
    '<input type="range" min="0" max="'+(opts.length-1)+'" step="1" value="'+(idx>=0?idx:0)+'">'+
    '<div class="slider-read"></div></div>';
}
function paintSlider(sq){
  var k=sq.dataset.slider,opts=SLIDERS[k],inp=sq.querySelector('input'),read=sq.querySelector('.slider-read');
  var v=A[k],idx=v?opts.indexOf(v):-1;
  var p=(idx>=0?idx:0)/(opts.length-1)*100;
  inp.style.background='linear-gradient(to right, var(--brand-500) '+p+'%, var(--gray-100) '+p+'%)';
  if(idx>=0)read.innerHTML='Selected: <strong>'+esc(v)+'</strong>'+esc(sq.dataset.suffix||'');
  else read.textContent='Drag the slider to select an estimate';
}
function wireQuestions(root,onChange){
  root.querySelectorAll('[data-chips]').forEach(function(g){
    var key=g.dataset.chips,multi=g.dataset.multi==='1';
    g.querySelectorAll('.chip').forEach(function(c){
      c.onclick=function(){
        var v=c.dataset.val;
        if(multi){
          A[key]=A[key]||[];
          var i=A[key].indexOf(v);
          if(i>=0)A[key].splice(i,1);else A[key].push(v);
          c.classList.toggle('on');
        }else{
          A[key]=v;
          g.querySelectorAll('.chip').forEach(function(x){x.classList.toggle('on',x===c);});
        }
        onChange(key);
      };
    });
  });
  root.querySelectorAll('.sliderq').forEach(function(sq){
    var k=sq.dataset.slider,opts=SLIDERS[k];
    paintSlider(sq);
    sq.querySelector('input').addEventListener('input',function(){
      A[k]=opts[+this.value];
      paintSlider(sq);
      onChange(k);
    });
  });
}

/* ============================ FULL workspace ============================ */
function pageStatus(id){
  /* done | attn | todo — drives the sidebar icons */
  if(id==='business')return 'done';
  if(id==='contacts')return A.idv?'done':'attn';
  if(id==='usage')return usageComplete()?'done':'todo';
  if(id==='documents'){
    var req=docRequirements();
    if(!usageComplete())return 'todo';
    return (req.length&&A.docs.length>=req.length)||(!req.length)?'done':'todo';
  }
  return 'todo';
}
function navIcon(st){
  if(st==='done')return I.navdone;
  if(st==='attn')return '<span style="width:9px;height:9px;border-radius:50%;background:var(--warn-700);display:block"></span>';
  return '<span class="ring"></span>';
}
function fullWorkspace(){
  var p=person();
  var nav=PAGE_ORDER.map(function(id){
    var st=id==='review'?null:pageStatus(id);
    var tag='';
    if(id==='contacts'&&!A.idv)tag='<span class="ni-tag you">Your ID check</span>';
    return '<button class="nav-item'+(S.wsPage===id?' active':'')+'" data-nav="'+id+'">'+
      '<span class="stat">'+(id==='review'?'<span class="ring"></span>':navIcon(st))+'</span>'+esc(PAGE_TITLES[id])+tag+'</button>';
  }).join('');
  return '<div class="app">'+
    '<div class="sidebar">'+
      '<span class="logo">'+LOGO+'</span>'+
      '<div class="ws-collabtag"><div class="ct-row"><div class="ct-av">'+esc(initials(p))+'</div>'+
        '<div><div class="ct-n">'+esc(pname())+'</div><div class="ct-r">Invited by '+esc(initiatorName())+'</div></div></div>'+
        '<div class="ct-badge"><span class="access-badge full">'+I.eye+' Full access</span></div></div>'+
      '<div class="step-meta">'+esc(INITIATOR.biz)+'</div>'+
      '<nav class="nav">'+nav+'</nav>'+
      '<div class="side-spacer"></div>'+
      '<div class="userbox"><div class="em">'+esc(p.email)+'</div><button id="wsOut">'+I.out+' Sign out</button></div>'+
    '</div>'+
    '<main><div class="col">'+
      '<div class="ws-context"><span class="wc-ic">'+I.spark+'</span><span class="wc-t">You&rsquo;re collaborating on <strong>'+esc(INITIATOR.biz)+'</strong>&rsquo;s application. Everything you fill is saved to the shared application — <strong>'+esc(INITIATOR.first)+'</strong> reviews and submits.</span></div>'+
      '<div id="wsBody">'+fullPage(S.wsPage)+'</div>'+
    '</div></main>'+
  '</div>';
}
function wireFullWorkspace(){
  document.querySelectorAll('[data-nav]').forEach(function(b){
    b.onclick=function(){S.wsPage=b.dataset.nav;render();};
  });
  $('wsOut').onclick=function(){
    if(cfg().auth==='account'){S.scen='fullReturn';resetAnswersKeep();go('signin');}
    else go('otp');
  };
  wirePage(S.wsPage);
}
/* sign-out keeps answers so "return later" feels real */
function resetAnswersKeep(){}

function bizField(k,label,val,opts){
  if(opts){
    var o=opts.map(function(x){return '<option'+(x===val?' selected':'')+'>'+esc(x)+'</option>';}).join('');
    return '<div class="field filled"><select data-biz="'+k+'">'+o+'</select><label>'+esc(label)+'</label><span class="chev">&#9662;</span></div>';
  }
  return '<div class="field'+(val?' filled':'')+'"><input data-biz="'+k+'" value="'+esc(val)+'"><label>'+esc(label)+'</label></div>';
}
function fullPage(id){
  if(id==='business')return pageBusiness();
  if(id==='contacts')return pageContacts();
  if(id==='usage')return pageUsageHtml(true);
  if(id==='documents')return pageDocumentsHtml(true);
  return pageReview();
}
function wirePage(id){
  var root=$('wsBody');
  if(id==='business'){
    root.querySelectorAll('[data-biz]').forEach(function(inp){
      inp.addEventListener('change',function(){BIZ[inp.dataset.biz]=inp.value;toast('Progress saved — visible to '+INITIATOR.first);});
      if(inp.tagName==='INPUT')inp.addEventListener('input',function(){inp.closest('.field').classList.toggle('filled',!!inp.value);});
    });
    wireContinue('contacts');
  }
  if(id==='contacts'){
    var vb=$('idvStart');
    if(vb)vb.onclick=startIdv;
    wireQuestions(root,function(){toast('Progress saved — visible to '+INITIATOR.first);
      /* re-render to show/hide the related-business card */
      $('wsBody').innerHTML=fullPage('contacts');wirePage('contacts');paintNav();});
    root.querySelectorAll('[data-rbfield]').forEach(function(inp){
      inp.addEventListener('input',function(){A[inp.dataset.rbfield]=inp.value;inp.closest('.field').classList.toggle('filled',!!inp.value);});
      inp.addEventListener('change',function(){A[inp.dataset.rbfield]=inp.value;toast('Progress saved — visible to '+INITIATOR.first);});
    });
    wireContinue('usage');
  }
  if(id==='usage'){
    wireQuestions(root,function(){toast('Progress saved — visible to '+INITIATOR.first);paintNav();});
    wireContinue('documents');
  }
  if(id==='documents'){
    runDocScreen();
    wireContinue('review');
  }
  if(id==='review'){
    var nb=$('notifyBtn');
    if(nb)nb.onclick=function(){
      A.readySent=true;
      $('wsBody').innerHTML=fullPage('review');wirePage('review');
    };
    root.querySelectorAll('[data-goto]').forEach(function(a){
      a.onclick=function(e){e.preventDefault();S.wsPage=a.dataset.goto;render();};
    });
  }
}
function paintNav(){
  document.querySelectorAll('[data-nav]').forEach(function(b){
    var id=b.dataset.nav;
    var st=id==='review'?null:pageStatus(id);
    b.querySelector('.stat').innerHTML=id==='review'?'<span class="ring"></span>':navIcon(st);
  });
}
function wireContinue(nextId){
  var b=$('pgContinue');
  if(b)b.onclick=function(){S.wsPage=nextId;render();};
}
function continueBtn(nextId){
  return '<div class="continue-wrap"><button class="btn btn-primary" id="pgContinue">Save and continue</button></div>';
}

  return inner;
}

/* --- documents page (shared markup: full and limited) --- */
function pageDocumentsHtml(full){
  var body;
  if(!usageComplete()&&full){
    body='<div class="info-banner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'+
      '<span>The screening runs once <strong>Expected usage</strong> is complete — it uses those answers to decide whether any documents are needed. <a href="#" id="goUsage">Finish Expected usage first</a>.</span></div>'+
      '<div class="fsec"><h2>Supporting documents</h2><p class="why">Optional for now — you can add anything you think strengthens the application.</p>'+uploadBlock('docHolder')+'</div>';
  }else{
    body='<div class="fsec"><h2>Application screening</h2><p class="why">Loop checks the application against the corporate registry and the expected usage, and only asks for documents when something needs backup.</p>'+
      '<div class="reg-panel" id="docAgentPanel"></div><div id="docAgentResult"></div></div>'+
      '<div class="fsec hidden" id="docUploadSec"><h2 id="docUploadTitle">Supporting documents</h2><p class="why" id="docUploadWhy"></p>'+uploadBlock('docHolder')+
      '<p class="why" style="margin-top:12px;font-size:12.5px">PDF, JPEG, or PNG, up to 10 MB each.</p></div>';
  }
  if(full){
    return '<h1 class="page-h">Documents</h1>'+
      '<p class="page-sub">Most applications need nothing here — the screening tells you if yours does.</p>'+
      '<div class="pagebody">'+body+COMPLIANCE+continueBtn('review')+'</div>';
  }
  return body;
}
var docTimers=[];
function runDocScreen(){
  docTimers.forEach(clearTimeout);docTimers=[];
  var gl=$('goUsage');
  if(gl){gl.onclick=function(e){e.preventDefault();S.wsPage='usage';render();};renderUploads('docHolder','Click to upload a document');return;}
  var panel=$('docAgentPanel');if(!panel)return;
  var check=I.navdone;
  if(A.docScreened){
    panel.innerHTML='<div class="reg-row done"><span class="ic">'+check+'</span><span>Application screened. Results below reflect the latest answers</span></div>';
    showDocResults();return;
  }
  var rows=[
    ['Reviewing the business profile','Business profile reviewed'],
    ['Checking registration and entity details','Registration details checked'],
    ['Assessing ownership and expected usage','Ownership and usage assessed']
  ];
  panel.innerHTML='';
  rows.forEach(function(r,i){
    var d=document.createElement('div');d.className='reg-row';
    d.innerHTML='<span class="ic"><span class="spinner"></span></span><span>'+r[0]+'</span>';
    panel.appendChild(d);
    docTimers.push(setTimeout(function(){
      d.className='reg-row done';
      d.innerHTML='<span class="ic">'+check+'</span><span>'+r[1]+'</span>';
      if(i===rows.length-1)docTimers.push(setTimeout(function(){A.docScreened=true;showDocResults();paintNavSafe();},400));
    },700+i*800));
  });
}
function paintNavSafe(){if(document.querySelector('[data-nav]'))paintNav();}
function showDocResults(){
  var R=$('docAgentResult'),sec=$('docUploadSec');
  if(!R)return;
  var req=docRequirements();
  sec.classList.remove('hidden');
  if(req.length){
    R.innerHTML=req.map(function(r){return '<div class="docreq">'+I.docReq+'<div><div class="dt">'+esc(r.t)+'</div><div class="dd">'+esc(r.d)+'</div></div></div>';}).join('');
    $('docUploadTitle').textContent='Upload the requested document'+(req.length>1?'s':'');
    $('docUploadWhy').textContent='Upload the '+req.length+' item'+(req.length>1?'s':'')+' above and this page is done.';
  }else{
    R.innerHTML='<div class="agent-banner">'+I.checkGreen+'<span><strong>No additional documents required.</strong> The application answers cover everything we need.</span></div>';
    $('docUploadTitle').textContent='Supporting documents';
    $('docUploadWhy').textContent='Nothing is required, but you can add anything you think strengthens the application.';
  }
  renderUploads('docHolder','Click to upload a document');
}

/* --- full: review (read-only + notify) --- */
function rvRow(l,v){
  return '<div class="rv-kr"><span class="l">'+esc(l)+'</span><span class="v'+(v?'':' miss')+'">'+(v?esc(v):'Not answered yet')+'</span></div>';
}
function pageReview(){
  var gaps=[];
  if(!A.idv)gaps.push(['contacts','Your identity check']);
  if(!A.incomeType)gaps.push(['usage','Type of income']);
  if(!A.outValue)gaps.push(['usage','Outgoing payment value']);
  if(!A.outCount)gaps.push(['usage','Outgoing payment count']);
  if(!A.inValue)gaps.push(['usage','Incoming payment value']);
  if(!A.inCount)gaps.push(['usage','Incoming payment count']);
  if(!(A.regions||[]).length)gaps.push(['usage','Countries you deal with']);
  if(!A.relBiz)gaps.push(['contacts','Related businesses answer']);
  var reqDocs=docRequirements();
  if(usageComplete()&&reqDocs.length&&A.docs.length<reqDocs.length)gaps.push(['documents','Requested document upload']);
  var ready=!gaps.length;
  var gapHtml=ready?'':'<div class="rv-sec"><div class="rv-head"><h3>Still missing</h3><span class="rv-st gap">'+gaps.length+' item'+(gaps.length>1?'s':'')+'</span></div><div class="rv-body">'+
    gaps.map(function(g){return '<div class="rv-kr"><span class="l">'+esc(PAGE_TITLES[g[0]])+'</span><span class="v miss">'+esc(g[1])+' — <a href="#" data-goto="'+g[0]+'">go to page</a></span></div>';}).join('')+'</div></div>';
  var notice=A.readySent
    ? '<div class="ok-banner" style="margin-top:26px">'+I.checkGreen+'<span><strong>'+esc(INITIATOR.first)+' has been notified.</strong> They&rsquo;ll get an email and an in-app nudge that the application is ready for a final look and submission.</span></div>'
    : '<div class="continue-wrap" style="margin-top:26px"><button class="btn btn-primary" id="notifyBtn"'+(ready?'':' disabled')+'>Let '+esc(INITIATOR.first)+' know it&rsquo;s ready</button></div>';
  return '<h1 class="page-h">Review</h1>'+
    '<p class="page-sub">Everything both of you filled in, in one place. Submitting stays with '+esc(initiatorName())+' as the account owner.</p>'+
    '<div class="pagebody">'+
      '<div class="rv-sec"><div class="rv-head"><h3>Business information</h3><span class="rv-st ok">Complete</span></div><div class="rv-body">'+
        rvRow('Legal business name',BIZ.legalName)+rvRow('Structure',BIZ.entityType)+rvRow('Industry',BIZ.industry+' · '+BIZ.subIndustry)+rvRow('Address',BIZ.address1+', '+BIZ.city+', '+BIZ.provState+' '+BIZ.postal)+
      '</div></div>'+
      '<div class="rv-sec"><div class="rv-head"><h3>Business contacts</h3><span class="rv-st '+(A.idv&&A.relBiz?'ok':'gap')+'">'+(A.idv&&A.relBiz?'Complete':'Needs attention')+'</span></div><div class="rv-body">'+
        rvRow('Daniel Okafor','Director · Signing officer · Identity verified')+
        rvRow('Sarah Chen','Director · Beneficial owner'+(A.idv?' · Identity verified':' · Identity check pending'))+
        rvRow('Related businesses',A.relBiz==='Yes'?('Yes — '+(A.rbName||'details pending')):A.relBiz)+
      '</div></div>'+
      '<div class="rv-sec"><div class="rv-head"><h3>Expected usage</h3><span class="rv-st '+(usageComplete()?'ok':'gap')+'">'+(usageComplete()?'Complete':'Needs attention')+'</span></div><div class="rv-body">'+
        rvRow('Planned use',(A.intendedUse||[]).join(', '))+rvRow('Income type',A.incomeType)+
        rvRow('Outgoing / year',A.outValue&&A.outCount?A.outValue+' · '+A.outCount+' payments':'')+
        rvRow('Incoming / year',A.inValue&&A.inCount?A.inValue+' · '+A.inCount+' payments':'')+
        rvRow('Regions',(A.regions||[]).join(', '))+
      '</div></div>'+
      '<div class="rv-sec"><div class="rv-head"><h3>Documents</h3><span class="rv-st '+(usageComplete()&&(!reqDocs.length||A.docs.length>=reqDocs.length)?'ok':'gap')+'">'+(usageComplete()?(reqDocs.length?A.docs.length+' of '+reqDocs.length+' uploaded':'None required'):'Awaiting screening')+'</span></div><div class="rv-body">'+
        (A.docs.length?A.docs.map(function(d){return rvRow('Uploaded',d);}).join(''):rvRow('Uploaded',usageComplete()&&!reqDocs.length?'Nothing needed':''))+
      '</div></div>'+
      gapHtml+
      '<div class="submit-gate">'+I.lock+'<span><strong>Only '+esc(initiatorName())+' can submit this application.</strong> As the account owner who started it, Daniel does the final certification and submission. Your job is done once everything above is complete.</span></div>'+
      notice+
    '</div>';
}

/* ============================ LIMITED (page-scoped) workspace ============================ */
function limItems(){
  var pg=scopedPage();
  if(pg==='usage'){
    return [
      {done:(A.intendedUse||[]).length>0},{done:!!A.incomeType},
      {done:!!A.outValue},{done:!!A.outCount},{done:!!A.inValue},{done:!!A.inCount},
      {done:(A.regions||[]).length>0}
    ];
  }
  var req=docRequirements();
  var n=Math.max(req.length,1);
  var items=[];
  for(var i=0;i<n;i++)items.push({done:A.docs.length>i});
  return items;
}
function limWorkspace(){
  var p=person(),pg=scopedPage();
  var items=limItems(),doneCt=items.filter(function(x){return x.done;}).length;
  var body= pg==='usage'?pageUsageHtml(false):pageDocumentsHtml(false);
  var verb=pg==='documents'?'uploaded':'answered';
  return '<div class="lim-wrap">'+
    '<div class="lim-top"><span class="logo">'+LOGO+'</span>'+
      '<div class="lt-right"><span class="lt-em">'+esc(p.email)+'</span><button class="lt-out" id="limOut">'+I.out+' Sign out</button></div></div>'+
    '<div class="lim-card">'+
      '<span class="access-badge lim" style="margin-bottom:14px">'+I.lock+' Page access · '+esc(PAGE_TITLES[pg])+'</span>'+
      '<h1>'+esc(PAGE_TITLES[pg])+'</h1>'+
      '<p class="lc-sub">'+esc(initiatorName())+' asked you to fill this page of <strong>'+esc(INITIATOR.biz)+'</strong>&rsquo;s application. This is the only page you can see — the rest of the company file stays private.</p>'+
      '<div class="lim-progress"><span id="limCt">'+doneCt+'</span> of '+items.length+' '+verb+'</div>'+
      '<div class="lim-bar"><span id="limBar" style="width:'+(doneCt/items.length*100)+'%"></span></div>'+
      '<div id="limBody">'+body+'</div>'+
      COMPLIANCE+
      '<div class="continue-wrap"><button class="btn btn-primary" id="limSend"'+(doneCt===items.length?'':' disabled')+'>Send back to '+esc(INITIATOR.first)+' '+I.arrowR+'</button></div>'+
      '<p class="foot-note" style="margin-top:14px">Not sure about something? You can close this tab and come back — your progress saves automatically.</p>'+
    '</div>'+
  '</div>';
}
function wireLimWorkspace(){
  var pg=scopedPage();
  $('limOut').onclick=function(){go('otp');};
  $('limSend').onclick=function(){go('done');};
  if(pg==='usage'){
    wireQuestions($('limBody'),function(){updateLimFooter();});
  }else{
    runDocScreen();
  }
}
function updateLimFooter(){
  var items=limItems(),doneCt=items.filter(function(x){return x.done;}).length;
  var ct=$('limCt'),bar=$('limBar'),send=$('limSend');
  if(ct)ct.textContent=doneCt;
  if(bar)bar.style.width=(doneCt/items.length*100)+'%';
  if(send)send.disabled=doneCt<items.length;
}

/* ---- done / handed back ---- */
SCREENS.done=function(){
  var p=person(),pg=scopedPage();
  return '<div class="sub-wrap">'+
    '<div class="sub-brand"><span class="logo">'+LOGO+'</span></div>'+
    '<div class="sub-card">'+
      '<div class="sub-check">'+I.bigcheck+'</div>'+
      '<h1>Thanks, '+esc(p.first)+' — it&rsquo;s on its way</h1>'+
      '<p class="lead">Your answers on the <strong>'+esc(PAGE_TITLES[pg])+'</strong> page were saved to '+esc(INITIATOR.biz)+'&rsquo;s application, and '+esc(initiatorName())+' has been notified.</p>'+
      '<ul class="next-list">'+
        '<li>'+I.check+'<span><strong>'+esc(INITIATOR.first)+' reviews your answers</strong> alongside the rest of the application before submitting.</span></li>'+
        '<li>'+I.check+'<span><strong>Your link keeps working</strong> — come back and edit anytime until the application is submitted or your access is removed.</span></li>'+
        '<li>'+I.check+'<span><strong>Nothing else is shared with you.</strong> You only ever saw the page assigned to you.</span></li>'+
      '</ul>'+
      '<div class="continue-wrap" style="margin-top:30px"><button class="btn btn-secondary" id="doneBack">Review my answers</button></div>'+
      '<p class="foot-note" style="margin-top:16px">All done? You can safely close this tab.</p>'+
    '</div>'+
  '</div>';
};
WIRE.done=function(){ $('doneBack').onclick=function(){go('workspace');}; };

/* ============================ render + dock ============================ */
function render(){
  var stage=$('stage');
  var fn=SCREENS[S.step]||SCREENS.email;
  stage.innerHTML=fn();
  if(WIRE[S.step])WIRE[S.step]();
  /* otp screens: wire the code row generically */
  if(S.step==='otp'){
    var row=document.querySelector('.code-row');
    if(row){
      row.id='otpRow';
      wireCode('otpRow',function(full){$('otpNext').disabled=!full;});
      $('otpNext').onclick=function(){go('workspace');};
    }
  }
  renderDock();
  try{history.replaceState(null,'','#'+S.scen+'/'+S.step+(S.step==='workspace'&&scope()==='full'?'/'+S.wsPage:''));}catch(e){}
  window.scrollTo(0,0);
}
function setScen(key,step){
  S.scen=key;
  resetAnswers();
  S.wsPage=scope()==='full'?'business':scopedPage();
  S.step=step||cfg().steps[0];
  render();
}
function renderDock(){
  var c=cfg();
  $('dockScen').textContent='Use case '+c.n+' — '+c.label;
  $('dockStep').textContent=STEP_NAMES[S.step]||S.step;
  var scens=SCEN_ORDER.map(function(k){
    var sc=SCEN[k];
    var tags='<span class="'+(sc.scope==='full'?'scope-full':'scope-lim')+'">'+(sc.scope==='full'?'FULL ACCESS':'PAGE · '+PAGE_TITLES[sc.page].toUpperCase())+'</span>'+
      '<span>'+esc(PEOPLE[sc.who].first)+'</span>'+
      '<span>'+(sc.auth==='account'?'Loop account':'Email code')+'</span>';
    return '<button class="scen'+(k===S.scen?' on':'')+'" data-scen="'+k+'">'+
      '<span class="sc-n"><span class="sc-num">'+sc.n+'</span>'+esc(sc.label)+'</span>'+
      '<span class="sc-d">'+esc(sc.desc)+'</span>'+
      '<span class="sc-tags">'+tags+'</span></button>';
  }).join('');
  $('dockScens').innerHTML=scens;
  $('dockScens').querySelectorAll('[data-scen]').forEach(function(b){
    b.onclick=function(){setScen(b.dataset.scen);};
  });
  var stepIdx=c.steps.indexOf(S.step);
  $('dockStepHint').textContent='— '+PEOPLE[c.who].first+' '+PEOPLE[c.who].last+' · '+PEOPLE[c.who].role;
  $('dockSteps').innerHTML=c.steps.map(function(st,i){
    var cls=st===S.step?' on':(stepIdx>=0&&i<stepIdx?' done':'');
    return '<button class="dstep'+cls+'" data-step="'+st+'"><span class="ds-num">'+(i+1)+'</span>'+esc(STEP_NAMES[st]||st)+'</button>';
  }).join('');
  $('dockSteps').querySelectorAll('[data-step]').forEach(function(b){
    b.onclick=function(){go(b.dataset.step);};
  });
}
$('dockToggle').onclick=function(){
  var p=$('dockPanel');
  p.classList.toggle('hidden');
  $('dockToggle').innerHTML='Use cases &amp; steps '+(p.classList.contains('hidden')?'&#9650;':'&#9660;');
};
$('dockNext').onclick=nextStep;
$('dockPrev').onclick=prevStep;
$('dockRestart').onclick=function(){setScen(S.scen);};
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight')nextStep();
  if(e.key==='ArrowLeft')prevStep();
});

/* boot — honour a #scenario/step hash for direct linking */
(function(){
  var h=(location.hash||'').replace('#','').split('/');
  if(h[0]&&SCEN[h[0]]){
    S.scen=h[0];resetAnswers();
    S.wsPage=scope()==='full'?'business':scopedPage();
    S.step=h[1]&&STEP_NAMES[h[1]]?h[1]:cfg().steps[0];
    if(h[2]&&PAGE_TITLES[h[2]]&&scope()==='full')S.wsPage=h[2];
    render();
  }else{
    setScen('fullNew');
  }
})();
</script>
</body>
</html>
